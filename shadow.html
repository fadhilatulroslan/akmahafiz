<!DOCTYPE html>
<html>
<head>
<style>
/* Kotak asas */
.box {
  width: 200px;
  height: 100px;
  background-color: lightblue;
  margin: 20px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: #333;
  text-align: center;
  font-size: 16px;
}

/* Box shadow biasa */
.shadow-box {
  box-shadow: 5px 5px 10px rgba(0,0,0,0.4);
}

/* Text shadow */
.text-shadow {
  text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

/* Gabungan box & text shadow */
.combined-shadow {
  box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
  text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<h2>Demo Box Shadow & Text Shadow</h2>

<div class="box shadow-box">Box Shadow</div>
<div class="box text-shadow">Text Shadow</div>
<div class="box combined-shadow">Box + Text Shadow</div>

</body>
</html>
