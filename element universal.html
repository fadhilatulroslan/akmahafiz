<!DOCTYPE html>
<html>
<head>
  <style>
    /* Element selector asas */
    p {
      font-family: Arial, sans-serif;
    }

    /* Class dengan saiz berbeza */
    .kecil {
      font-size: 14px; /* ayat kecil */
    }

    .sederhana {
      font-size: 18px; /* ayat sederhana */
    }

    .besar {
      font-size: 22px; /* ayat besar */
    }

    .sangatBesar {
      font-size: 28px; /* ayat sangat besar */
    }
  </style>
</head>
<body>
  <p class="kecil">Ini ayat pertama dengan saiz tulisan 14px.</p>
  <p class="sederhana">Ini ayat kedua dengan saiz tulisan 18px.</p>
  <p class="besar">Ini ayat ketiga dengan saiz tulisan 22px.</p>
  <p class="sangatBesar">Ini ayat keempat dengan saiz tulisan 28px.</p>
</body>
</html>
