<!DOCTYPE html>
<html>
<head>
<style>
.highlight {
  color: red;
  font-weight: bold;
}
</style>
</head>
<body>

<h2 class="highlight">Tajuk guna class selector</h2>

<p class="highlight">
Ini perenggan pertama yang menggunakan class selector.
Style yang sama boleh digunakan pada banyak elemen.
</p>

<p class="highlight">
Ini perenggan kedua yang masih menggunakan class yang sama.
Semua teks ini akan ikut style yang ditetapkan.
</p>

</body>
</html>
