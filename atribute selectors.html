<!DOCTYPE html>
<html>
<head>
<style>

/* Base style untuk button */
[demo] {
  color: white;
  background-color: blue; /* link biasa */
  border: 2px solid blue;
  padding: 15px 30px;
  display: inline-block;
  text-decoration: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* Visited state */
[demo]:visited {
  background-color: rgb(236, 119, 199); /* berubah bila dah klik */
  border-color: rgb(228, 148, 192);
  color: white;
}

/* Hover effect */
[demo]:hover {
  transform: translateY(-5px); /* naik sikit bila hover */
  box-shadow: 0 5px 10px rgba(0,0,0,0.3); /* bayang-bayang */
  /* background ikut link/visited supaya warna tetap jelas */
}

/* Active effect */
[demo]:active {
  transform: translateY(0); /* turun balik bila klik */
  box-shadow: none;
  background-color: green; /* hijau bila tekan */
  border-color: green;
}
</style>
</head>
<body>


<a demo="example" href="https://example.com" target="_blank">Klik Saya</a>

</body>
</html>
