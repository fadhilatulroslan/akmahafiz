<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobsheet Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background-color: #f0f2f5;
}

.navbar {
  background-color: #222;
  display: flex;
  padding: 10px 20px;
}
.navbar a {
  color: white;
  text-decoration: none;
  padding: 12px 20px;
  margin-right: 10px;
  border-radius: 5px;
}
.navbar a:hover, .navbar a.active {
  background: linear-gradient(45deg, #4CAF50, #00bfa5);
}

.header {
  text-align: center;
  padding: 50px 20px;
  background: linear-gradient(120deg, #6a11cb, #2575fc);
  color: white;
  font-size: 2.5em;
  font-weight: 600;
}

/* Progress bar */
.progress-wrapper {
  padding: 20px;
  text-align: center;
}
.progress-container {
  width: 80%;
  margin: auto;
  background: #ddd;
  border-radius: 20px;
  overflow: hidden;
  height: 25px;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(45deg, #4CAF50, #00bfa5);
  color: white;
  text-align: center;
  line-height: 25px;
  font-weight: bold;
  transition: width 0.5s ease;
}

/* Cards */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.jobsheet-card {
  text-decoration: none;
  color: inherit;
  background: white;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.jobsheet-card:hover {
  transform: translateY(-10px);
  background: #e0f7fa;
}

.jobsheet-card i {
  font-size: 50px;
  margin-bottom: 15px;
  color: #4CAF50;
}

</style>
</head>
<body>

<div class="navbar">
  <a href="#" class="active">Home</a>
  <a href="#">About Us</a>
</div>

<div class="header">
  My Dashboard
</div>

<!-- Progress -->
<div class="progress-wrapper">
  <p><b>Jobsheet Progress</b></p>
  <div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
</div>

<div class="container" id="jobsheetContainer"></div>

<script>
const totalJobsheet = 15;

/* ✅ ONLY list jobsheet that exist */
const existingJobsheets = [
  {id:1, file:"JS1.html"},
  {id:2, file:"JS2.html"},
  {id:3, file:"JS3.html"}
];

/* Progress auto kira */
function updateProgress() {
  const percent = Math.round((existingJobsheets.length / totalJobsheet) * 100);
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.textContent = percent + "%";
}

/* Generate cards */
function renderJobsheets() {
  const container = document.getElementById("jobsheetContainer");
  container.innerHTML = "";

  existingJobsheets.forEach(j => {
    container.innerHTML += `
      <a href="${j.file}" class="jobsheet-card">
        <i class="ri-file-list-3-line"></i>
        <h3>Jobsheet ${j.id}</h3>
        <p>Open Jobsheet ${j.id}</p>
      </a>
    `;
  });
}

renderJobsheets();
updateProgress();
</script>

</body>
</html>
