<!DOCTYPE html>
<html>
<head>
<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
}

/* Layer gambar fullscreen */
.layer-background {
  width: 100%;
  height: 100vh; /* fullscreen tinggi */
  
 background-image:
  url('activity 2.jpg'), /* bawah */
  url('bird.png'),        /* tengah */
  url('monyet.png');       /* atas */

background-size:
  cover,       /* activity 2 penuh */
  100px 100px, /* bird kecil */
  120px 120px; /* orang kecil */

background-position:
  center,      /* activity 2 tengah */
  top left,    /* bird atas kiri */
  top right;   /* orang atas kanan */

  
  /* Saiz gambar */
  background-size: cover, cover, 150px 150px; /* gambar atas lebih kecil */
  
  /* Posisi gambar */
  background-position: center, center, top right; /* gambar atas kanan */
  
  background-repeat: no-repeat;
  
  /* Blend mode */
  background-blend-mode: multiply;
  
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 32px;
  font-weight: bold;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
}
</style>
</head>
<body>

<div class="layer-background">
  Layer Gambar Fullscreen
</div>

</body>
</html>
