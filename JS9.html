<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Shopping Cart</title>
    <link href="js9style.css" rel="stylesheet" />
    <script src="data.js"></script>
</head>

<body>
<div class="title">
    <h1>Shopping Cart</h1>
</div>

<table class="table-fill">
    <thead>
        <tr>
            <th colspan="2">Product</th>
            <th>#</th>
            <th>Price</th>
            <th>Amount</th>
        </tr>
    </thead>

    <tbody id="cartBody"></tbody>

    <tbody>
        <tr class="totals">
            <td colspan="4">Subtotal</td>
            <td id="subtotal"></td>
        </tr>
        <tr class="totals">
            <td colspan="4">Tax</td>
            <td id="tax"></td>
        </tr>
        <tr class="totals">
            <td colspan="4">Shipping</td>
            <td id="shipping"></td>
        </tr>
        <tr class="totals focus">
            <td colspan="4">Grand Total</td>
            <td id="grand"></td>
        </tr>
    </tbody>
</table>

<script src="lab9.js"></script>
</body>
</html>
