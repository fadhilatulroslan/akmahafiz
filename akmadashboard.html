<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background-color: #f0f2f5;
  }

  .navbar {
    background-color: #222;
    display: flex;
    align-items: center;
    padding: 10px 20px;
  }

  .navbar a {
    color: white;
    text-decoration: none;
    padding: 12px 20px;
    margin-right: 10px;
    border-radius: 5px;
    transition: 0.3s;
  }

  .navbar a:hover, .navbar a.active {
    background: linear-gradient(45deg, #4CAF50, #00bfa5);
  }

  .header {
    text-align: center;
    padding: 50px 20px;
    background: linear-gradient(120deg, #6a11cb, #2575fc);
    color: white;
    font-size: 2.5em;
    font-weight: 600;
  }

  /* Progress Bar */
  .progress-wrapper {
    padding: 20px;
    text-align: center;
  }

  .progress-container {
    width: 80%;
    margin: auto;
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
    height: 25px;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(45deg, #4CAF50, #00bfa5);
    color: white;
    text-align: center;
    line-height: 25px;
    font-weight: bold;
    transition: width 0.5s ease;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .jobsheet-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    text-decoration: none;
    color: inherit;
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: 0.3s;
  }

  .jobsheet-card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 12px 20px rgba(0,0,0,0.2);
    background: #e0f7fa;
  }

  .jobsheet-card i {
    font-size: 50px;
    margin-bottom: 15px;
    color: #4CAF50;
  }

  .jobsheet-card p {
    color: #555;
  }
</style>
</head>

<body>

<div class="navbar">
  <a href="#" class="active">Home</a>
  <a href="#">About Us</a>
</div>

<div class="header">
  My Dashboard
</div>

<!-- Progress Bar -->
<div class="progress-wrapper">
  <p><b>Jobsheet Progress</b></p>
  <div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
</div>

<div class="container">
  <a href="JS1.html" class="jobsheet-card">
    <i class="ri-file-list-3-line"></i>
    <h3>Jobsheet 1</h3>
    <p>Click to open jobsheet 1</p>
  </a>

  <a href="JS2.html" class="jobsheet-card">
    <i class="ri-file-list-3-line"></i>
    <h3>Jobsheet 2</h3>
    <p>Click to open jobsheet 2</p>
  </a>

  <a href="JS3.html" class="jobsheet-card">
    <i class="ri-file-list-3-line"></i>
    <h3>Jobsheet 3</h3>
    <p>Click to open jobsheet 3</p>
  </a>

  <a href="JS4.html" class="jobsheet-card">
    <i class="ri-file-list-3-line"></i>
    <h3>Jobsheet 4</h3>
    <p>Click to open jobsheet 4</p>
  </a>

  <a href="JS5.html" class="jobsheet-card">
    <i class="ri-file-list-3-line"></i>
    <h3>Jobsheet 5</h3>
    <p>Click to open jobsheet 5</p>
  </a>
</div>

<script>
const totalJobsheet = 15;

/* kira jumlah jobsheet yang ada dalam page */
const existingJobsheets = document.querySelectorAll(".jobsheet-card").length;

function updateProgress() {
  const percent = Math.round((existingJobsheets / totalJobsheet) * 100);
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.textContent = percent + "%";
}

updateProgress();
</script>

</body>
</html>
